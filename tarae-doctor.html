<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>타래 검사기</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%A9%BA</text></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface2: #f2f0ec;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1916;
    --text2: #6b6860;
    --text3: #a09e99;
    --primary: #5E7C8A;
    --primary-soft: #E9EEF0;
    --radius-md: 10px;
    --ok: #3f7d5c;
    --ok-bg: #eaf3ee;
    --warn: #9a6b21;
    --warn-bg: #faf1e0;
    --bad: #a4423a;
    --bad-bg: #faecea;
    --mono: 'SFMono-Regular', Consolas, 'D2Coding', 'Courier New', monospace;
}

body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: var(--bg); color: var(--text);
    padding: 0 0 60px;
    display: flex; flex-direction: column; align-items: center;
    line-height: 1.6;
}

.top-nav {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; background: var(--surface);
    border-bottom: 1px solid var(--border); margin-bottom: 28px;
}
.top-nav-brand { font-size: 13.5px; font-weight: 700; display: flex; align-items: center; gap: 6px; text-decoration: none; color: var(--text); }

.wrap { width: 100%; max-width: 780px; padding: 0 20px; }

h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
.sub { color: var(--text2); font-size: 13.5px; margin-top: 6px; margin-bottom: 22px; }

button:focus-visible, label:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

.card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 20px; margin-bottom: 16px;
}

.drop {
    display: block; text-align: center; padding: 30px 20px; cursor: pointer;
    border: 2px dashed var(--border2); border-radius: var(--radius-md);
    background: var(--surface2); font-size: 14px; font-weight: 600; color: var(--text2);
}
.drop:hover { border-color: var(--primary); color: var(--primary); }
.drop.drag { border-color: var(--primary); background: var(--primary-soft); color: var(--primary); }
input[type=file] { display: none; }


.btn {
    font-size: 13px; font-weight: 700; padding: 9px 16px; border-radius: var(--radius-md);
    border: 1px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer;
}
.btn:hover { background: var(--surface2); color: var(--text); }
.btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
.btn.primary:hover { filter: brightness(1.08); }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 12px; }

/* 진단 결과 */
.verdict { border-radius: var(--radius-md); padding: 14px 16px; margin-bottom: 14px; font-size: 14px; font-weight: 700; }
.verdict.ok { background: var(--ok-bg); color: var(--ok); }
.verdict.warn { background: var(--warn-bg); color: var(--warn); }
.verdict.bad { background: var(--bad-bg); color: var(--bad); }
.verdict .detail { display: block; font-weight: 500; font-size: 13px; margin-top: 5px; }

.sec-title { font-size: 12px; font-weight: 800; color: var(--text3); letter-spacing: .06em; margin: 18px 0 8px; }
.kv { display: grid; grid-template-columns: 130px 1fr; gap: 4px 12px; font-size: 13px; }
.kv dt { color: var(--text2); }
.kv dd { font-family: var(--mono); font-size: 12.5px; word-break: break-all; }

.flag { font-size: 13px; padding: 9px 12px; border-radius: 8px; margin-bottom: 6px; }
.flag.ok  { background: var(--ok-bg); color: var(--ok); }
.flag.warn{ background: var(--warn-bg); color: var(--warn); }
.flag.bad { background: var(--bad-bg); color: var(--bad); }

/* 코드포인트 X-ray */
.xray { background: var(--surface2); border-radius: 8px; padding: 12px; overflow-x: auto; }
.xray-line { font-family: var(--mono); font-size: 12px; color: var(--text2); margin-bottom: 8px; word-break: break-all; }
.chips { display: flex; flex-wrap: wrap; gap: 3px; }
.chip {
    font-family: var(--mono); font-size: 10.5px; line-height: 1.25; text-align: center;
    padding: 3px 4px; border-radius: 4px; background: var(--surface);
    border: 1px solid var(--border); min-width: 30px;
}
.chip b { display: block; font-size: 12px; font-weight: 700; }
.chip.sus { background: var(--bad-bg); border-color: #e5bdb8; color: var(--bad); }
.chip.mask { background: var(--surface2); border-color: var(--border); color: var(--text3); }
.chip.inv { background: var(--warn-bg); border-color: #e6d3ae; color: var(--warn); }

table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }
th, td { text-align: left; padding: 7px 9px; border-bottom: 1px solid var(--border); vertical-align: top; }
th { font-size: 11.5px; color: var(--text3); font-weight: 700; letter-spacing: .04em; }
td.c { white-space: pre-wrap; word-break: break-word; }
.tbl-wrap { max-height: 380px; overflow: auto; }

.note { font-size: 12.5px; color: var(--text2); background: var(--surface2); padding: 11px 13px; border-radius: 8px; margin-top: 12px; }
.hidden { display: none; }
.count { font-size: 13px; color: var(--text2); margin-top: 12px; }
</style>
</head>
<body>

<nav class="top-nav">
    <a class="top-nav-brand" href="#">🩺 타래 검사기</a>
</nav>

<div class="wrap">
    <h1>파일이 왜 안 읽히는지 확인하기</h1>
    <p class="sub">대화 파일을 넣으면 어디서 멈추는지 알려줍니다. 파일은 이 페이지 밖으로 나가지 않고, 검사 결과에서 대화 내용과 파일 이름은 ●로 가려집니다.</p>

    <!-- ============ 파일 검사 ============ -->
    <section>
        <div class="card">
            <label class="drop" id="drop" tabindex="0">
                📁 파일 선택 — 카톡 zip·txt, 트위터·마스토돈 HTML (끌어다 놓아도 됩니다)
                <input type="file" id="file" accept=".zip,.txt,.html,.htm">
            </label>
        </div>
        <div id="report"></div>
    </section>

</div>

<script>
/* ============================================================
   카카오톡 파싱 — 타래 뽑기 본체와 동일한 로직 (그대로 사용)
   ============================================================ */
function pad2(n) { return String(n).padStart(2, '0'); }

function toWebTimestamp(str) {
    if (!str) return "";
    const s = str.trim();
    const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})(?:[T ](\d{1,2}):(\d{2})(?::(\d{2}))?)?$/);
    if (iso) {
        if (iso[4] === undefined) return `${iso[1]}-${iso[2]}-${iso[3]}`;
        return `${iso[1]}-${iso[2]}-${iso[3]}T${pad2(iso[4])}:${iso[5]}:${iso[6] ? iso[6] : '00'}`;
    }
    const m = s.match(/(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})(?:\s*(오전|오후)\s*(\d{1,2}):(\d{2})(?::(\d{2}))?)?/);
    if (!m) return s;
    const datePart = `${m[1]}-${pad2(m[2])}-${pad2(m[3])}`;
    if (m[5] === undefined) return datePart;
    let hour = +m[5];
    if (m[4] === '오후' && hour < 12) hour += 12;
    if (m[4] === '오전' && hour === 12) hour = 0;
    const sec = m[7] ? m[7] : '00';
    return `${datePart}T${pad2(hour)}:${m[6]}:${sec}`;
}

// 본체와 동일한 정규식 세트
const RX = {
    mobileHeader: /^(\d{4}년\s*\d{1,2}월\s*\d{1,2}일\s*(?:오전|오후)\s*\d{1,2}:\d{2}),\s*([^:]+?)\s*:\s*(.*)$/,
    iosHeader:    /^(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})\.\s*(?:(오전|오후)\s*)?(\d{1,2}):(\d{2}),\s*([^:]+?)\s*:\s*(.*)$/,
    iosSystem:    /^\d{4}\.\s*\d{1,2}\.\s*\d{1,2}\.\s*(?:(?:오전|오후)\s*)?\d{1,2}:\d{2}:\s/,
    pcHeader:     /^\[([^\]]+)\]\s*\[((?:오전|오후)\s*\d{1,2}:\d{2})\]\s*(.*)$/,
    system:       /님이 (들어왔습니다|나갔습니다)\.?\s*$/,
    titleOrSaved: /님과 카카오톡 대화\s*$|^저장한 날짜\s*[:：]/,
};

function tryExtractDividerDate(trimmed) {
    const patterns = [
        /^-{3,}\s*(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일[^-]*-{3,}$/,
        /^(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일\s*(?:오전|오후)\s*\d{1,2}:\d{2}\s*$/,
        /^(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일\s*[가-힣]*요일?\s*$/,
    ];
    for (const re of patterns) {
        const m = trimmed.match(re);
        if (m) return `${m[1]}. ${m[2]}. ${m[3]}`;
    }
    return null;
}

// 파싱 + 줄별 판정 기록(검사용). rows 와 lineKinds 를 함께 돌려준다.
function parseKakao(text) {
    const rawLines = text.split(/\r\n|\r|\n/);
    const lineKinds = [];
    function to12h(hour24, min) {
        const ampm = hour24 < 12 ? '오전' : '오후';
        let h = hour24 % 12; if (h === 0) h = 12;
        return `${ampm} ${h}:${min}`;
    }

    let current = null, currentDate = '';
    const rawRows = [];
    function flush() {
        if (current) {
            const content = current.contentLines.join('\n').trim();
            if (content !== '') rawRows.push({ name: current.name, id: "id_" + current.name, time: current.time, content, pfp: "" });
        }
        current = null;
    }

    rawLines.forEach((rawLine, i) => {
        const line = rawLine.replace(/\r$/, '');
        const trimmed = line.trim();

        if (trimmed === '') { lineKinds.push({ i, line, kind: 'blank' }); return; }

        let m = line.match(RX.pcHeader);
        if (m) {
            flush();
            const timeOnly = m[2].trim();
            current = { name: m[1].trim(), time: currentDate ? `${currentDate} ${timeOnly}` : timeOnly, contentLines: [m[3]] };
            lineKinds.push({ i, line, kind: 'msg', fmt: 'PC', name: m[1].trim(), body: m[3] });
            return;
        }
        m = line.match(RX.iosHeader);
        if (m) {
            flush();
            let hour = +m[5];
            if (m[4]) { hour = hour % 12; if (m[4] === '오후') hour += 12; }   // 12시간제 → 24시간
            current = { name: m[7].trim(), time: `${m[1]}. ${+m[2]}. ${+m[3]} ${to12h(hour, m[6])}`, contentLines: [m[8]] };
            lineKinds.push({ i, line, kind: 'msg', fmt: 'iOS', name: m[7].trim(), body: m[8] });
            return;
        }
        m = line.match(RX.mobileHeader);
        if (m) {
            flush();
            const dm = m[1].match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일\s*((?:오전|오후)\s*\d{1,2}:\d{2})/);
            current = { name: m[2].trim(), time: dm ? `${dm[1]}. ${dm[2]}. ${dm[3]} ${dm[4]}` : m[1], contentLines: [m[3]] };
            lineKinds.push({ i, line, kind: 'msg', fmt: '안드로이드', name: m[2].trim(), body: m[3] });
            return;
        }

        // 내보내기 파일 맨 앞의 파일명 줄(Talk_....txt)도 안내 줄로 본다 — 정상 파일에서
        // '못 읽은 줄'로 잡혀 오해를 부르기 때문. 추출 결과(행)에는 영향 없음.
        const isTitleFilename = i < 3 && /\.txt\s*$/i.test(trimmed);
        if (RX.system.test(trimmed) || RX.iosSystem.test(trimmed) || RX.titleOrSaved.test(trimmed) || isTitleFilename) {
            lineKinds.push({ i, line, kind: 'system' }); return;
        }
        const dividerDate = tryExtractDividerDate(trimmed);
        if (dividerDate) { currentDate = dividerDate; lineKinds.push({ i, line, kind: 'divider' }); return; }

        if (current) { current.contentLines.push(line); lineKinds.push({ i, line, kind: 'cont' }); }
        else { lineKinds.push({ i, line, kind: 'orphan' }); }
    });
    flush();

    function getDatePart(t) { const m = t.match(/^(\d{4}\.\s*\d{1,2}\.\s*\d{1,2})/); return m ? m[1] : t; }
    const rows = [];
    rawRows.forEach(row => {
        const last = rows[rows.length - 1];
        if (last && last.name === row.name && getDatePart(last.time) === getDatePart(row.time)) {
            last.content = last.content + '\n' + row.content;
            last.time = row.time;
        } else rows.push({ ...row });
    });
    rows.forEach(r => { r.time = toWebTimestamp(r.time); });
    return { rows, lineKinds };
}

/* ============================================================
   문자 검사
   ============================================================ */
const SUSPECT = {
    0x200B: '제로폭 공백', 0x200C: '제로폭 비접합', 0xFEFF: '제로폭 없음표(BOM)',
    0x00A0: '줄바꿈 없는 공백', 0x2007: '고정폭 공백', 0x202F: '좁은 고정폭 공백',
    0xFF0E: '전각 마침표', 0xFF1A: '전각 콜론', 0xFF0C: '전각 쉼표', 0x3002: '한중일 마침표',
    0x2024: '한자리 마침표', 0xFFFD: '깨진 문자',
    0x200E: '왼→오 표시', 0x200F: '오→왼 표시', 0x2066: '방향 격리', 0x2069: '방향 격리 끝',
};
function isFullwidthDigit(cp) { return cp >= 0xFF10 && cp <= 0xFF19; }
function suspectName(cp) {
    if (SUSPECT[cp]) return SUSPECT[cp];
    if (isFullwidthDigit(cp)) return '전각 숫자';
    return null;
}

function scanSuspects(text) {
    const found = new Map();
    for (const ch of text) {
        const cp = ch.codePointAt(0);
        const nm = suspectName(cp);
        if (nm) {
            const key = cp;
            if (!found.has(key)) found.set(key, { cp, name: nm, count: 0 });
            found.get(key).count++;
        }
    }
    return [...found.values()].sort((a, b) => b.count - a.count);
}

// 진단에 필요한 글자만 남기고 나머지(대화 내용)는 ●로 가린다.
// 원칙: 진단에 쓰이는 건 줄 앞머리의 타임스탬프뿐이므로 앞 24글자 안에서만 형식 글자를 남기고,
// 그 뒤(이름·본문)는 숫자까지 전부 가린다 — 계좌번호·전화번호가 새지 않도록.
const KEEP_RX = /[0-9.:,\-\[\]\/() ]/;
const KEEP_WORD = new Set([...'년월일요']);          // 오전/오후는 낱글자 말고 단어일 때만
const INVISIBLE = new Set([0x200B, 0x200C, 0x200D, 0xFEFF, 0x00A0, 0x2007, 0x202F, 0x200E, 0x200F, 0x2066, 0x2069]);
const MASK_HEAD = 24;

// 글자별로 [글자, 보여줄지] 를 계산한다.
function maskInfo(line, head = MASK_HEAD) {
    const chars = [...line];
    const keepIdx = new Set();
    for (let i = 0; i < chars.length - 1; i++) {          // '오전' / '오후' 만 보존
        if (chars[i] === '오' && (chars[i + 1] === '전' || chars[i + 1] === '후')) { keepIdx.add(i); keepIdx.add(i + 1); }
    }
    // 'AM' 'PM' 'a.m.' 등도 보존 — 단 시각 바로 뒤에 붙은 경우만(이름 속 'am' 오탐 방지)
    for (let i = 0; i < chars.length; i++) {
        const c = chars[i];
        if (c !== 'A' && c !== 'a' && c !== 'P' && c !== 'p') continue;
        let j = i + 1; const span = [i];
        if (chars[j] === '.') { span.push(j); j++; }
        if (chars[j] === 'M' || chars[j] === 'm') { span.push(j); j++; } else continue;
        if (chars[j] === '.') span.push(j);
        const before = chars.slice(Math.max(0, i - 8), i).join('');
        if (/\d:\d{2}\s*$/.test(before)) span.forEach(k => keepIdx.add(k));
    }
    return chars.map((ch, i) => {
        const cp = ch.codePointAt(0);
        if (INVISIBLE.has(cp)) return { ch, keep: true };  // 안 보이는 문자는 내용이 아니라 원인 후보
        const fmt = KEEP_RX.test(ch) || KEEP_WORD.has(ch) || keepIdx.has(i) || !!suspectName(cp);
        return { ch, keep: i < head && fmt };
    });
}
// 파일명 가리기 — 브라우저가 게시글 제목으로 파일명을 짓기 때문에
// 표시이름·핸들·본문이 그대로 담긴다. 날짜와 파트번호(-1, -2)만 남기고 지운다.
function maskFilename(name) {
    const str = String(name || '');
    const dot = str.lastIndexOf('.');
    const hasExt = dot > 0 && str.length - dot <= 7;
    const stem = hasExt ? str.slice(0, dot) : str;
    const ext = hasExt ? str.slice(dot) : '';
    const masked = [...stem].map(ch => /[0-9._\-]/.test(ch) ? ch : '●').join('').replace(/●+/g, '●');
    return masked + ext;
}

function maskLine(line, head = MASK_HEAD) {
    return maskInfo(line, head).map(o => o.keep ? o.ch : '●').join('');
}

// 한 줄을 글자별 코드포인트로 펼쳐 보여준다 (본문 글자는 가림)
function xrayLine(line, limit = 46) {
    const info = maskInfo(line).slice(0, limit);
    const chips = info.map(({ ch, keep }) => {
        if (!keep) return `<span class="chip mask" title="대화 내용 (가림)"><b>●</b>····</span>`;
        const cp = ch.codePointAt(0);
        const nm = suspectName(cp);
        const hex = 'U+' + cp.toString(16).toUpperCase().padStart(4, '0');
        let shown = ch;
        if (cp === 0x20) shown = '␠';
        else if (cp < 0x21 || nm) shown = '·';
        const cls = nm ? (INVISIBLE.has(cp) ? 'chip inv' : 'chip sus') : 'chip';
        const title = nm ? `${hex} ${nm}` : hex;
        return `<span class="${cls}" title="${title}"><b>${escapeHtml(shown)}</b>${hex.replace('U+', '')}</span>`;
    }).join('');
    const more = [...line].length > limit ? `<div class="xray-line">…이하 생략</div>` : '';
    return `<div class="chips">${chips}</div>${more}`;
}

function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

/* ============================================================
   파일 검사
   ============================================================ */
const drop = document.getElementById('drop');
const fileInput = document.getElementById('file');
const report = document.getElementById('report');

drop.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); } });
['dragenter', 'dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('drag'); }));
['dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('drag'); }));
drop.addEventListener('drop', e => { const f = e.dataTransfer.files[0]; if (f) handleFile(f); });
fileInput.addEventListener('change', e => { const f = e.target.files[0]; if (f) handleFile(f); });

function handleFile(file) {
    report.innerHTML = '<div class="card">읽는 중…</div>';
    const isZip = /\.zip$/i.test(file.name);
    const isHtml = /\.html?$/i.test(file.name);
    const reader = new FileReader();
    reader.onload = evt => {
        try {
            if (isHtml) diagnoseHtml(file, evt.target.result);
            else if (isZip) diagnoseZip(file, new Uint8Array(evt.target.result));
            else diagnoseBytes(file, new Uint8Array(evt.target.result), null);
        } catch (err) {
            report.innerHTML = `<div class="card"><div class="verdict bad">파일을 여는 중 문제가 생겼습니다<span class="detail">${escapeHtml(err.message || String(err))}</span></div></div>`;
        }
    };
    if (isHtml) reader.readAsText(file, 'UTF-8');
    else reader.readAsArrayBuffer(file);
}

function diagnoseZip(file, bytes) {
    let files;
    try {
        files = fflate.unzipSync(bytes);
    } catch (err) {
        report.innerHTML = `<div class="card">
            <div class="verdict bad">zip을 열지 못했습니다
            <span class="detail">파일이 중간에 끊겼거나 zip이 아닐 수 있습니다. 카카오톡에서 다시 내보내 주세요.</span></div>
            <dl class="kv"><dt>오류</dt><dd>${escapeHtml(err.message || String(err))}</dd></dl></div>`;
        return;
    }
    const all = Object.keys(files);
    const txts = all.filter(n => /\.txt$/i.test(n)).sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
    if (txts.length === 0) {
        report.innerHTML = `<div class="card">
            <div class="verdict bad">zip 안에 대화 파일(.txt)이 없습니다
            <span class="detail">카카오톡 대화 내보내기로 만든 zip이 맞는지 확인해 주세요.</span></div>
            <div class="sec-title">zip 안에 들어 있는 것</div>
            <dl class="kv">${all.slice(0, 40).map(n => `<dt>파일</dt><dd>${escapeHtml(n)}</dd>`).join('')}</dl></div>`;
        return;
    }
    // 파트 전부 이어붙이기 (본체와 동일)
    // 본체와 동일하게, zip 안의 파일도 BOM 을 보고 인코딩을 정한다.
    function decodeEntry(bytes) {
        if (bytes[0] === 0xFF && bytes[1] === 0xFE) return new TextDecoder('utf-16le').decode(bytes);
        if (bytes[0] === 0xFE && bytes[1] === 0xFF) return new TextDecoder('utf-16be').decode(bytes);
        return new TextDecoder('utf-8').decode(bytes);
    }
    const text = txts.map(n => decodeEntry(files[n])).join('\n');
    const merged = new TextEncoder().encode(text);
    diagnoseBytes(file, merged, { all, txts });
}

function diagnoseBytes(file, bytes, zipInfo) {
    // --- 인코딩 판정 ---
    const hasUtf8Bom = bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF;
    const utf16LE = bytes[0] === 0xFF && bytes[1] === 0xFE;
    const utf16BE = bytes[0] === 0xFE && bytes[1] === 0xFF;
    let nullBytes = 0;
    for (let i = 0; i < Math.min(bytes.length, 4000); i++) if (bytes[i] === 0) nullBytes++;

    let text, encodingLabel;
    if (utf16LE || utf16BE) {
        text = new TextDecoder(utf16LE ? 'utf-16le' : 'utf-16be').decode(bytes);
        encodingLabel = utf16LE ? 'UTF-16 LE' : 'UTF-16 BE';
    } else {
        text = new TextDecoder('utf-8').decode(bytes); // 선두 BOM 자동 제거
        encodingLabel = hasUtf8Bom ? 'UTF-8 (BOM 있음)' : 'UTF-8';
    }
    const broken = (text.match(/\uFFFD/g) || []).length;

    // --- 줄바꿈 ---
    const crlf = (text.match(/\r\n/g) || []).length;
    const lfOnly = (text.match(/(?<!\r)\n/g) || []).length;
    const crOnly = (text.match(/\r(?!\n)/g) || []).length;

    // --- 파싱 ---
    const { rows, lineKinds } = parseKakao(text);
    const counts = { msg: 0, system: 0, divider: 0, cont: 0, orphan: 0, blank: 0 };
    const fmts = new Set();
    lineKinds.forEach(k => { counts[k.kind]++; if (k.fmt) fmts.add(k.fmt); });

    // --- 수상한 문자 ---
    const suspects = scanSuspects(text);

    // --- 12시간제 흔적: 한글(오전/오후)이든 영문(AM/PM)이든, 시각 앞이든 뒤든 ---
    const ampmIos = (text.match(
        /^\d{4}\.\s*\d{1,2}\.\s*\d{1,2}\.\s*(?:(?:오전|오후)\s*\d{1,2}:\d{2}|\d{1,2}:\d{2}\s*(?:[AaPp]\.?[Mm]\.?|오전|오후))/gm
    ) || []).length;
    const ampmEng = (text.match(/\d{1,2}:\d{2}\s*[AaPp]\.?[Mm]\.?/g) || []).length;

    // --- 우리가 아는 세 형식이 아닌데 날짜/시각처럼 보이는 줄 (다른 언어·지역 설정 의심) ---
    const foreignish = lineKinds.filter(k => k.kind === 'orphan' && (
        /^\d{1,4}[.\-\/]\s?\d{1,2}[.\-\/]\s?\d{1,4}/.test(k.line.trim()) ||
        /^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\.?\s+\d/i.test(k.line.trim()) ||
        /\d{1,2}:\d{2}\s*[AaPp]\.?[Mm]/.test(k.line)
    )).length;

    // --- 이름에 콜론 의심 ---
    // 이름에 콜론이 있으면 그 콜론에서 잘리므로, 잘린 나머지가 내용 앞에 "B : " 꼴로 남는다.
    const colonSuspectLines = lineKinds.filter(k =>
        k.kind === 'msg' && /^[^\s:][^:]{0,14}?\s+:\s/.test(k.body || '')
    ).slice(0, 3);
    // 이름 자체에 전각 콜론이 들어간 경우는 이름칸에 그대로 남는다
    const colonNames = [...new Set(lineKinds.filter(k => k.kind === 'msg' && /[:：]/.test(k.name || '')).map(k => k.name))];

    // --- 첫 실패 줄 (내용이 있는데 메시지로도 시스템으로도 못 잡힌 줄) ---
    const firstOrphan = lineKinds.find(k => k.kind === 'orphan');

    // --- 판정 ---
    let verdict, vclass, detail;
    if (rows.length > 0) {
        verdict = `대화 ${rows.length}건을 읽었습니다`; vclass = 'ok';
        detail = '이 파일은 타래 뽑기에서도 읽히는 형식입니다. 그래도 추출이 안 된다면 아래 검사 결과를 저장해 보내 주세요.';
    } else if (utf16LE || utf16BE) {
        verdict = '파일이 UTF-16으로 저장되어 있습니다'; vclass = 'bad';
        detail = '메모장이나 다른 편집기에서 다시 저장하면서 형식이 바뀐 것 같습니다. 카카오톡에서 내보낸 원본을 그대로 넣어 주세요.';
    } else if (broken > 0 && nullBytes > 200) {
        verdict = '파일이 UTF-16으로 저장되어 있습니다 (표시 없음)'; vclass = 'bad';
        detail = '메모장에서 [다른 이름으로 저장]을 눌러 인코딩을 UTF-8로 바꿔 저장한 뒤 다시 넣어 주세요.';
    } else if (broken > 0) {
        verdict = '글자가 깨진 상태로 저장되어 있습니다'; vclass = 'bad';
        detail = '다른 프로그램에서 저장하며 인코딩이 바뀐 것 같습니다. 원본 zip을 그대로 넣어 주세요.';
    } else if (ampmEng > 0) {
        verdict = '시각이 AM/PM으로 적혀 있어 읽지 못했습니다'; vclass = 'bad';
        detail = '휴대폰 설정에서 시간 표기를 한국어(오전/오후)나 24시간제로 바꾸고 대화를 다시 내보내면 읽힙니다.';
    } else if (foreignish > 0) {
        verdict = '날짜와 시각 표기가 예상과 다릅니다'; vclass = 'bad';
        detail = '휴대폰 언어·지역 설정이 한국어가 아닌 상태로 내보낸 것 같습니다. 설정을 한국어로 바꾸고 다시 내보내면 읽힙니다.';
    } else if (suspects.length > 0) {
        verdict = '대화를 한 건도 읽지 못했습니다'; vclass = 'bad';
        detail = '아래 “섞여 있는 특수문자”가 원인일 가능성이 높습니다. 이 화면을 그대로 캡처해 보내 주세요.';
    } else if (text.trim() === '') {
        verdict = '파일 내용이 비어 있습니다'; vclass = 'bad';
        detail = '압축을 푸는 중 파일이 만들어지지 않았을 수 있습니다. zip을 그대로 넣어 다시 확인해 주세요.';
    } else {
        verdict = '대화를 한 건도 읽지 못했습니다'; vclass = 'bad';
        detail = '아래 “첫 번째로 못 읽은 줄”을 그대로 캡처해 보내 주세요. 원인을 바로 찾을 수 있습니다.';
    }

    // --- 리포트 ---
    let html = `<div class="card">
        <div class="verdict ${vclass}">${escapeHtml(verdict)}<span class="detail">${escapeHtml(detail)}</span></div>

        <div class="sec-title">파일</div>
        <dl class="kv">
            <dt>이름</dt><dd>${escapeHtml(maskFilename(file.name))}</dd>
            <dt>크기</dt><dd>${(file.size / 1024).toFixed(1)} KB</dd>
            <dt>저장 형식</dt><dd>${escapeHtml(encodingLabel)}</dd>
            <dt>줄바꿈</dt><dd>${crlf ? 'CRLF ' + crlf + ' ' : ''}${lfOnly ? 'LF ' + lfOnly + ' ' : ''}${crOnly ? 'CR ' + crOnly : ''}</dd>
            <dt>전체 줄 수</dt><dd>${lineKinds.length}</dd>
        </dl>`;

    if (zipInfo) {
        html += `<div class="sec-title">zip 안</div>
        <dl class="kv">
            <dt>대화 파일</dt><dd>${zipInfo.txts.length}개 — ${escapeHtml(zipInfo.txts.map(maskFilename).join(', '))}</dd>
            <dt>전체 항목</dt><dd>${zipInfo.all.length}개</dd>
        </dl>`;
        if (zipInfo.txts.length > 1) {
            html += `<div class="flag ok">여러 개로 나뉜 대화 파일 ${zipInfo.txts.length}개를 순서대로 이어 붙였습니다.</div>`;
        }
    }

    html += `<div class="sec-title">줄별 판정</div>
        <dl class="kv">
            <dt>대화로 읽음</dt><dd>${counts.msg}줄${fmts.size ? ' (' + [...fmts].join(', ') + ' 형식)' : ''}</dd>
            <dt>이어지는 내용</dt><dd>${counts.cont}줄</dd>
            <dt>안내·날짜 줄</dt><dd>${counts.system + counts.divider}줄</dd>
            <dt>못 읽은 줄</dt><dd>${counts.orphan}줄</dd>
            <dt>최종 추출</dt><dd>${rows.length}건</dd>
        </dl>`;

    // 특수문자
    if (suspects.length) {
        html += `<div class="sec-title">섞여 있는 특수문자</div>`;
        suspects.forEach(s => {
            const hex = 'U+' + s.cp.toString(16).toUpperCase().padStart(4, '0');
            const cls = (s.cp === 0xFFFD) ? 'bad' : 'warn';
            html += `<div class="flag ${cls}">${escapeHtml(s.name)} <span style="font-family:var(--mono)">${hex}</span> — ${s.count}개</div>`;
        });
        html += `<p class="note">눈에는 보이지 않지만 글자 사이에 끼어 있는 문자입니다. 이게 시각·날짜 부분에 들어가면 대화를 못 읽습니다.</p>`;
    } else {
        html += `<div class="sec-title">섞여 있는 특수문자</div><div class="flag ok">없습니다.</div>`;
    }

    if (utf16LE || utf16BE) {
        html += `<div class="flag ok">저장 형식이 UTF-16입니다. 내용은 멀쩡하고 읽는 데 문제도 없습니다.</div>`;
    }
    if (ampmIos > 0 && ampmEng === 0) {
        html += `<div class="flag ok">시각이 12시간제(오전/오후)로 적혀 있습니다 — ${ampmIos}줄. 정상적으로 읽을 수 있는 형식입니다.</div>`;
    } else if (ampmEng > 0) {
        html += `<div class="flag warn">시각이 AM/PM으로 적혀 있습니다 — ${ampmEng}줄. 아직 지원하지 않는 표기입니다.</div>`;
    }
    if (foreignish > 0 && ampmIos === 0) {
        html += `<div class="flag warn">날짜·시각 표기가 우리가 아는 형식과 다른 줄이 ${foreignish}줄 있습니다. 휴대폰 언어·지역 설정이 한국어가 아닐 수 있습니다.</div>`;
    }
    if (colonNames.length) {
        html += `<div class="flag warn">이름에 콜론이 들어간 대화 상대가 있습니다: ${escapeHtml(colonNames.join(', '))}</div>`;
    }
    if (colonSuspectLines.length) {
        html += `<div class="flag warn">이름에 콜론(:)이 들어간 상대가 있는 것 같습니다. 이러면 이름이 잘려서 들어갑니다.<br>
        예: <span style="font-family:var(--mono);font-size:11.5px">${escapeHtml(maskLine(colonSuspectLines[0].line).slice(0, 70))}</span></div>`;
    }

    // 첫 실패 줄 X-ray
    if (firstOrphan) {
        html += `<div class="sec-title">첫 번째로 못 읽은 줄 (${firstOrphan.i + 1}번째 줄)</div>
        <div class="xray">
            <div class="xray-line">${escapeHtml(maskLine(firstOrphan.line).slice(0, 120))}</div>
            ${xrayLine(firstOrphan.line)}
        </div>
        <p class="note">글자 하나하나의 번호입니다. 마침표는 002E, 콜론은 003A, 쉼표는 002C, 숫자는 0030~0039여야 정상입니다. 빨간 칸이 있으면 그게 원인입니다.<br>대화 내용은 ●로 가려져 있으니 이 화면은 그대로 캡처해 보내도 됩니다.</p>`;
    } else if (rows.length === 0 && lineKinds.length) {
        const firstReal = lineKinds.find(k => k.kind !== 'blank');
        if (firstReal) {
            html += `<div class="sec-title">첫 줄 살펴보기 (${firstReal.i + 1}번째 줄)</div>
            <div class="xray">
                <div class="xray-line">${escapeHtml(maskLine(firstReal.line).slice(0, 120))}</div>
                ${xrayLine(firstReal.line)}
            </div>`;
        }
    }

    html += `<div class="row">
        <button class="btn primary" id="saveReport">검사 결과 저장 (이미지)</button>
        <button class="btn" id="copyReport">글자로 복사</button>
    </div>`;
    html += `</div>`;

    // 미리보기 (기본은 내용을 가림 — 캡처해서 보내도 안전하게)
    if (rows.length) {
        html += `<div class="card">
            <div class="sec-title" style="margin-top:0">읽어 온 대화 (앞 20건)</div>
            <div class="row" style="margin-top:0;margin-bottom:10px">
                <button class="btn" id="revealBtn">내용 보기</button>
                <span style="font-size:12.5px;color:var(--text2)">캡처해서 보낼 때는 가린 상태로 두세요.</span>
            </div>
            <div class="tbl-wrap" id="previewTable"></div>
        </div>`;
    }

    report.innerHTML = html;

    // 미리보기 표 렌더 + 가리기 토글
    if (rows.length) {
        let revealed = false;
        const tableBox = document.getElementById('previewTable');
        const revealBtn = document.getElementById('revealBtn');
        const drawTable = () => {
            tableBox.innerHTML = `<table><thead><tr><th>이름</th><th>시각</th><th>내용</th></tr></thead><tbody>
            ${rows.slice(0, 20).map(r => {
                const nm = revealed ? r.name : maskLine(r.name);
                const ct = revealed ? r.content.slice(0, 200) : maskLine(r.content.slice(0, 200));
                return `<tr><td>${escapeHtml(nm)}</td><td style="font-family:var(--mono);font-size:11.5px">${escapeHtml(r.time)}</td><td class="c">${escapeHtml(ct)}</td></tr>`;
            }).join('')}
            </tbody></table>`;
        };
        drawTable();
        revealBtn.addEventListener('click', () => {
            revealed = !revealed;
            revealBtn.textContent = revealed ? '내용 가리기' : '내용 보기';
            drawTable();
        });
    }

    // 결과 텍스트 복사 (스크린샷 대신 붙여넣어 보낼 수 있게)
    const btn = document.getElementById('copyReport');
    {
        const lines = [
            `[타래 검사기 결과 · 카카오톡]`,
            `판정: ${verdict}`,
            `안내: ${detail}`,
            `파일: ${maskFilename(file.name)} / ${(file.size / 1024).toFixed(1)}KB / ${encodingLabel}`,
            zipInfo ? `zip 내 대화 파일: ${zipInfo.txts.length}개 (${zipInfo.txts.map(maskFilename).join(', ')})` : null,
            `전체 ${lineKinds.length}줄 — 대화 ${counts.msg}, 이어짐 ${counts.cont}, 안내 ${counts.system + counts.divider}, 못 읽음 ${counts.orphan}`,
            `최종 추출: ${rows.length}건`,
            `줄바꿈: ${crlf ? 'CRLF ' + crlf + ' ' : ''}${lfOnly ? 'LF ' + lfOnly + ' ' : ''}${crOnly ? 'CR ' + crOnly : ''}`.trim(),
            `깨진 문자: ${broken ? broken + '개' : '없음'}`,
            suspects.length ? `특수문자: ${suspects.map(s => `${s.name}(U+${s.cp.toString(16).toUpperCase().padStart(4, '0')})x${s.count}`).join(', ')}` : `특수문자: 없음`,
            `12시간제: ${ampmIos ? (ampmEng > 0 ? 'AM/PM ' : '오전/오후 ') + ampmIos + '줄' : '없음'}`,
            `형식 불일치: ${(foreignish && ampmIos === 0) ? foreignish + '줄 (다른 언어·지역 의심)' : '없음'}`,
            `이름 콜론 의심: ${(colonNames.length || colonSuspectLines.length) ? '있음' : '없음'}`,
            colonSuspectLines.length ? `  예: ${maskLine(colonSuspectLines[0].line).slice(0, 60)}` : null,
            firstOrphan ? `첫 실패 줄(${firstOrphan.i + 1}): ${maskLine(firstOrphan.line).slice(0, 40)}` : null,
            firstOrphan ? `  글자번호: ${[...maskLine(firstOrphan.line)].slice(0, 30).map(c => c === '●' ? '●' : 'U+' + c.codePointAt(0).toString(16).toUpperCase().padStart(4, '0')).join(' ')}` : null,
        ].filter(Boolean);
        wireReportButtons(lines, btn);
    }
}

/* ============================================================
   검사 결과 이미지로 저장 (외부 라이브러리 없이 캔버스에 직접 그림)
   ============================================================ */
// 복사 버튼 + 이미지 저장 버튼을 한 번에 연결한다.
function wireReportButtons(lines, copyBtn) {
    const text = lines.join('\n');
    if (copyBtn) copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(text).then(() => {
            copyBtn.textContent = '복사했습니다';
            setTimeout(() => copyBtn.textContent = '글자로 복사', 1600);
        });
    });
    const saveBtn = document.getElementById('saveReport');
    if (saveBtn) saveBtn.addEventListener('click', () => {
        saveReportImage(lines, '타래검사결과.png');
        saveBtn.textContent = '저장했습니다';
        setTimeout(() => saveBtn.textContent = '검사 결과 저장 (이미지)', 1600);
    });
}

function saveReportImage(lines, filename) {
    const pad = 24, lh = 26, fs = 15;
    const cv = document.createElement('canvas');
    const ctx = cv.getContext('2d');
    const font = `${fs}px 'Malgun Gothic','Apple SD Gothic Neo',sans-serif`;
    ctx.font = font;

    // 긴 줄은 접어서 폭 안에 맞춘다
    const maxW = 720;
    const wrapped = [];
    lines.forEach(t => {
        let cur = '';
        for (const ch of String(t)) {
            if (ctx.measureText(cur + ch).width > maxW - pad * 2) { wrapped.push(cur); cur = '   ' + ch; }
            else cur += ch;
        }
        wrapped.push(cur);
    });

    const ratio = window.devicePixelRatio || 1;
    cv.width = maxW * ratio;
    cv.height = (wrapped.length * lh + pad * 2) * ratio;
    ctx.scale(ratio, ratio);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, maxW, cv.height / ratio);
    ctx.font = font;
    ctx.textBaseline = 'top';

    wrapped.forEach((t, i) => {
        ctx.fillStyle = i === 0 ? '#1a1916' : (/^판정:/.test(t) ? '#a4423a' : '#333029');
        if (i === 0) ctx.font = `700 ${fs + 1}px 'Malgun Gothic','Apple SD Gothic Neo',sans-serif`;
        else ctx.font = font;
        ctx.fillText(t, pad, pad + i * lh);
    });

    cv.toBlob(blob => {
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename || '검사결과.png';
        link.click();
        setTimeout(() => URL.revokeObjectURL(link.href), 1000);
    });
}

/* ============================================================
   HTML 검사 (트위터 / 마스토돈) — 단계별 계수
   ============================================================ */
// 본체 추출기가 쓰는 셀렉터와 동일하게 맞춘다.
const SEL = {
    mastodon: {
        label: '마스토돈',
        container: '.status__wrapper, .detailed-status__wrapper',
        name: '.display-name__html, .display-name strong',
        text: '.status__content__text, .status__content',
    },
    twitter: {
        label: '트위터(X)',
        container: 'article[data-testid="tweet"]',
        name: '[data-testid="User-Name"]',
        text: '[data-testid="tweetText"]',
    },
    twitterCard: {
        label: '트위터(아카이브 카드)',
        container: '.tweet-card',
        name: '.user-name',
        text: '.tweet-body',
    },
};

function countStages(doc, s) {
    const els = doc.querySelectorAll(s.container);
    let name = 0, time = 0, text = 0, rows = 0;
    els.forEach(el => {
        const n = el.querySelector(s.name);
        const t = el.querySelector('time');
        const c = el.querySelector(s.text);
        const okN = !!(n && n.textContent.trim());
        const okC = !!(c && c.textContent.trim());
        if (okN) name++;
        if (t) time++;
        if (okC) text++;
        if (okN && okC) rows++;      // 본체의 행 추가 조건과 동일
    });
    return { container: els.length, name, time, text, rows };
}

// 어떤 구조인지 모를 때, 대화 한 덩이처럼 보이는 클래스를 세어 힌트를 준다.
function probeStructure(doc) {
    const counts = new Map();
    doc.querySelectorAll('[class]').forEach(el => {
        for (let i = 0; i < el.classList.length; i++) {
            const c = el.classList[i];
            if (/status|toot|note|tweet|post|entry|message|timeline|item/i.test(c)) {
                counts.set(c, (counts.get(c) || 0) + 1);
            }
        }
    });
    return [...counts.entries()].sort((a, b) => b[1] - a[1]).slice(0, 10);
}

// 트위터처럼 클래스명이 난독화된 페이지는 data-testid 로 구조를 본다.
function probeTestIds(doc) {
    const counts = new Map();
    doc.querySelectorAll('[data-testid]').forEach(el => {
        const v = el.getAttribute('data-testid');
        if (v) counts.set(v, (counts.get(v) || 0) + 1);
    });
    return [...counts.entries()].sort((a, b) => b[1] - a[1]).slice(0, 8);
}

const FEDI_SOFTWARE = ['mastodon', 'misskey', 'pleroma', 'akkoma', 'gotosocial', 'firefish', 'sharkey', 'iceshrimp', 'friendica', 'pixelfed'];

function diagnoseHtml(file, text) {
    const doc = new DOMParser().parseFromString(text, 'text/html');

    // --- 저장 방식 ---
    const savedFrom = /<!--\s*saved from url=/i.test(text);
    const localRefs = (text.match(/_files\//g) || []).length;
    const totalEls = doc.querySelectorAll('*').length;
    const scriptEls = doc.querySelectorAll('script').length;
    // 화면 내용이 함께 저장됐는지는 로컬 자원(_files/) 참조 유무로 갈린다.
    // saved-from 주석은 브라우저·저장 방식에 따라 없을 수도 있어 보조 단서로만 쓴다.
    const saveMode = localRefs > 0
        ? '웹페이지, 전부'
        : ('웹페이지, HTML만 — 화면 내용이 함께 저장되지 않음' + (savedFrom ? '' : ' (또는 원본 소스 파일)'));

    // --- 서버·소프트웨어 ---
    const canonical = doc.querySelector('link[rel="canonical"]');
    let host = '';
    if (canonical) { try { host = new URL(canonical.getAttribute('href')).hostname; } catch (e) { } }
    const genEl = doc.querySelector('meta[name="generator"]');
    const generator = genEl ? (genEl.getAttribute('content') || '') : '';
    const softHits = FEDI_SOFTWARE.filter(k => new RegExp(k, 'i').test(text));
    const hasInitialState = !!doc.querySelector('script#initial-state');

    // --- 단계별 계수 ---
    const st = {
        mastodon: countStages(doc, SEL.mastodon),
        twitter: countStages(doc, SEL.twitter),
        twitterCard: countStages(doc, SEL.twitterCard),
    };
    // 어떤 플랫폼으로 읽히는지: 컨테이너가 가장 많이 잡힌 쪽
    let best = 'mastodon';
    ['twitter', 'twitterCard'].forEach(k => { if (st[k].container > st[best].container) best = k; });
    const bestSel = SEL[best], bestSt = st[best];
    const detected = bestSt.container > 0 ? bestSel.label
        : (hasInitialState ? '마스토돈(추정)' : (doc.querySelectorAll('[data-testid]').length > 20 ? '트위터(추정)' : '알 수 없음'));

    const struct = probeStructure(doc);
    const testIdStruct = probeTestIds(doc);

    // --- 판정 ---
    let verdict, vclass, detail;
    if (totalEls < 5) {
        verdict = 'HTML 파일이 아닌 것 같습니다'; vclass = 'bad';
        detail = '브라우저에서 [다른 이름으로 저장 → 웹페이지, 전부]로 저장한 파일을 넣어 주세요.';
    } else if (bestSt.rows > 0) {
        verdict = `대화 ${bestSt.rows}건을 읽었습니다`; vclass = 'ok';
        detail = '이 파일은 타래 뽑기에서도 읽히는 형식입니다. 그래도 추출이 안 된다면 아래 검사 결과를 저장해 보내 주세요.';
    } else if (bestSt.container === 0 && localRefs === 0) {
        verdict = '화면 내용이 저장되지 않았습니다'; vclass = 'bad';
        detail = '[웹페이지, HTML만]으로 저장하면 글이 안 담깁니다. 저장할 때 형식을 [웹페이지, 전부]로 골라 주세요.';
    } else if (bestSt.container === 0) {
        verdict = '이 페이지에서 글을 찾지 못했습니다'; vclass = 'bad';
        detail = detected === '알 수 없음'
            ? '트위터·마스토돈 대화 화면이 아니거나, 우리가 아직 지원하지 않는 서버일 수 있습니다.'
            : '글이 다 뜬 뒤에 저장했는지 확인해 주세요. 화면을 끝까지 내려 다 보이게 한 다음 저장해야 합니다.';
    } else {
        verdict = '글은 찾았는데 내용을 읽지 못했습니다'; vclass = 'bad';
        detail = '서버나 화면 구조가 우리가 아는 것과 다릅니다. 아래 “페이지 구조”를 그대로 캡처해 보내 주세요.';
    }

    // --- 리포트 ---
    let html = `<div class="card">
        <div class="verdict ${vclass}">${escapeHtml(verdict)}<span class="detail">${escapeHtml(detail)}</span></div>

        <div class="sec-title">파일</div>
        <dl class="kv">
            <dt>이름</dt><dd>${escapeHtml(maskFilename(file.name))}</dd>
            <dt>크기</dt><dd>${(file.size / 1024).toFixed(1)} KB</dd>
            <dt>저장 방식</dt><dd>${escapeHtml(saveMode)}</dd>
            <dt>화면 요소</dt><dd>${totalEls}개 (스크립트 ${scriptEls}개)</dd>
        </dl>

        <div class="sec-title">어디 페이지인가</div>
        <dl class="kv">
            <dt>판별</dt><dd>${escapeHtml(detected)}</dd>
            ${host ? `<dt>서버 주소</dt><dd>${escapeHtml(host)}</dd>` : ''}
            ${generator ? `<dt>생성기</dt><dd>${escapeHtml(generator)}</dd>` : ''}
            ${softHits.length ? `<dt>발견된 이름</dt><dd>${escapeHtml(softHits.join(', '))}</dd>` : ''}
        </dl>`;

    if (softHits.length && softHits.indexOf('mastodon') === -1) {
        html += `<div class="flag warn">이 서버는 마스토돈이 아니라 ${escapeHtml(softHits.join('/'))} 계열로 보입니다. 화면 구조가 달라서 지금은 읽지 못합니다.</div>`;
    }

    html += `<div class="sec-title">단계별로 몇 개나 살아남았나</div>
        <dl class="kv">
            <dt>글 덩이 찾기</dt><dd>${bestSt.container}개 <span style="color:var(--text3)">(${escapeHtml(bestSel.container)})</span></dd>
            <dt>이름 읽기</dt><dd>${bestSt.name}개</dd>
            <dt>시각 읽기</dt><dd>${bestSt.time}개</dd>
            <dt>본문 읽기</dt><dd>${bestSt.text}개</dd>
            <dt>최종 추출</dt><dd>${bestSt.rows}건</dd>
        </dl>
        <p class="note">위에서부터 순서대로 걸러집니다. 어느 줄에서 0이 되는지가 곧 원인입니다.</p>`;

    // 다른 플랫폼도 참고로
    const others = Object.keys(st).filter(k => k !== best && st[k].container > 0);
    if (others.length) {
        html += `<div class="flag ok">다른 형식으로도 잡힙니다: ${others.map(k => `${SEL[k].label} ${st[k].container}개`).join(', ')}</div>`;
    }

    if (struct.length) {
        html += `<div class="sec-title">페이지 구조 (글처럼 보이는 덩어리)</div>
        <div class="xray"><div class="chips">
        ${struct.map(([c, n]) => `<span class="chip" style="min-width:auto;padding:4px 7px"><b>${escapeHtml(c)}</b>${n}개</span>`).join('')}
        </div></div>
        <p class="note">우리가 찾는 이름과 다른 게 잔뜩 있다면, 그 서버는 화면 구조가 다른 것입니다. 대화 내용은 들어 있지 않으니 그대로 캡처해 보내도 됩니다.</p>`;
    }

    if (testIdStruct.length) {
        html += `<div class="sec-title">페이지 구조 (표시 이름표)</div>
        <div class="xray"><div class="chips">
        ${testIdStruct.map(([c, n]) => `<span class="chip" style="min-width:auto;padding:4px 7px"><b>${escapeHtml(c)}</b>${n}개</span>`).join('')}
        </div></div>`;
    }

    html += `<div class="row">
        <button class="btn primary" id="saveReport">검사 결과 저장 (이미지)</button>
        <button class="btn" id="copyReport">글자로 복사</button>
    </div></div>`;

    // 미리보기 (가림 기본)
    const rows = [];
    if (bestSt.rows > 0) {
        doc.querySelectorAll(bestSel.container).forEach(el => {
            const n = el.querySelector(bestSel.name), c = el.querySelector(bestSel.text), t = el.querySelector('time');
            if (n && n.textContent.trim() && c && c.textContent.trim()) {
                rows.push({ name: n.textContent.trim(), time: t ? (t.getAttribute('datetime') || t.textContent.trim()) : '', content: c.textContent.trim() });
            }
        });
        html += `<div class="card">
            <div class="sec-title" style="margin-top:0">읽어 온 대화 (앞 20건)</div>
            <div class="row" style="margin-top:0;margin-bottom:10px">
                <button class="btn" id="revealBtn">내용 보기</button>
                <span style="font-size:12.5px;color:var(--text2)">캡처해서 보낼 때는 가린 상태로 두세요.</span>
            </div>
            <div class="tbl-wrap" id="previewTable"></div>
        </div>`;
    }

    report.innerHTML = html;

    if (rows.length) {
        let revealed = false;
        const box = document.getElementById('previewTable'), btn2 = document.getElementById('revealBtn');
        const draw = () => {
            box.innerHTML = `<table><thead><tr><th>이름</th><th>시각</th><th>내용</th></tr></thead><tbody>
            ${rows.slice(0, 20).map(r => {
                const nm = revealed ? r.name : maskLine(r.name, 0);
                const ct = revealed ? r.content.slice(0, 200) : maskLine(r.content.slice(0, 200), 0);
                return `<tr><td>${escapeHtml(nm)}</td><td style="font-family:var(--mono);font-size:11.5px">${escapeHtml(r.time)}</td><td class="c">${escapeHtml(ct)}</td></tr>`;
            }).join('')}</tbody></table>`;
        };
        draw();
        btn2.addEventListener('click', () => { revealed = !revealed; btn2.textContent = revealed ? '내용 가리기' : '내용 보기'; draw(); });
    }

    const btn = document.getElementById('copyReport');
    {
        const lines = [
            `[타래 검사기 결과 · HTML]`,
            `판정: ${verdict}`,
            `안내: ${detail}`,
            `파일: ${maskFilename(file.name)} / ${(file.size / 1024).toFixed(1)}KB`,
            `저장 방식: ${saveMode}`,
            `판별: ${detected}${softHits.length ? ' / 발견된 이름: ' + softHits.join(', ') : ''}${generator ? ' / 생성기: ' + generator : ''}`,
            `요소 ${totalEls}개, 스크립트 ${scriptEls}개`,
            others.length ? `다른 형식으로도 잡힘: ${others.map(k => SEL[k].label + ' ' + st[k].container + '개').join(', ')}` : null,
            `단계: 글덩이 ${bestSt.container} → 이름 ${bestSt.name} / 시각 ${bestSt.time} / 본문 ${bestSt.text} → 행 ${bestSt.rows}`,
            struct.length ? `구조: ${struct.map(([c, n]) => c + '(' + n + ')').join(', ')}` : null,
            testIdStruct.length ? `구조(이름표): ${testIdStruct.map(([c, n]) => c + '(' + n + ')').join(', ')}` : null,
        ].filter(Boolean);
        wireReportButtons(lines, btn);
    }
}

</script>
</body>
</html>
